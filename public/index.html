<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIWV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f0f; color: white;
           display: flex; flex-direction: column; height: 100vh; }
    .videos { display: flex; flex: 1; gap: 4px; background: #000; position: relative; }
    #remoteVideo { width: 100%; object-fit: cover; background: #111; }
    #localVideo { width: 200px; position: absolute; bottom: 20px; right: 20px;
                  border-radius: 12px; border: 2px solid #fff; }
    #status { text-align: center; padding: 10px; background: #111; color: #aaa; font-size: 14px; }
    .controls { display: flex; align-items: center; justify-content: center;
                gap: 16px; padding: 16px; background: #1a1a1a; }
    button { padding: 12px 28px; border-radius: 50px; border: none; font-size: 15px;
             font-weight: 600; cursor: pointer; transition: all .2s; }
    #btnStart { background: #534AB7; color: white; }
    #btnNext  { background: #2a2a2a; color: white; }
    #btnEnd   { background: #e53e3e; color: white; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="status">Willkommen bei SIWV – klicke auf Starten!</div>
  <div class="videos">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay muted playsinline></video>
  </div>
  <div class="controls">
    <button id="btnStart" onclick="findPartner()">▶ Starten</button>
    <button id="btnNext"  onclick="nextPartner()" disabled>Weiter →</button>
    <button id="btnEnd"   onclick="hangUp()"      disabled>✕ Beenden</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
   const socket = io();
let localStream, pc, currentRoom;

const cfg = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: 'turn:relay.metered.ca:80',
      username: 'e005037a7167582faa2fa409',
      credential: 'jehlFvnUS7KbnGrz'
    },
    {
      urls: 'turn:relay.metered.ca:80?transport=tcp',
      username: 'e005037a7167582faa2fa409',
      credential: 'jehlFvnUS7KbnGrz'
    },
    {
      urls: 'turn:relay.metered.ca:443',
      username: 'e005037a7167582faa2fa409',
      credential: 'jehlFvnUS7KbnGrz'
    },
    {
      urls: 'turn:relay.metered.ca:443?transport=tcp',
      username: 'e005037a7167582faa2fa409',
      credential: 'jehlFvnUS7KbnGrz'
    }
  ]
};

async function findPartner() {
  if (!localStream) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch(e) {
      alert('Kamera/Mikrofon Fehler: ' + e.message);
      return;
    }
  }
  socket.emit('find-partner');
  setStatus('Suche Partner...');
  setBtns(false, false, true);
}

function makePeer() {
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection(cfg);

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (event) => {
    console.log('Remote Track erhalten:', event.streams);
    const remoteVideo = document.getElementById('remoteVideo');
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
      remoteVideo.play().catch(e => console.log('Play error:', e));
    }
    setStatus('Verbunden!');
    setBtns(false, true, true);
  };

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('ice-candidate', { room: currentRoom, candidate });
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log('ICE State:', pc.iceConnectionState);
    setStatus('ICE: ' + pc.iceConnectionState);
    if (pc.iceConnectionState === 'connected') {
      setStatus('Verbunden!');
    }
  };
}

socket.on('waiting', () => setStatus('Warte auf Partner...'));

socket.on('partner-found', async ({ room, isInitiator }) => {
  currentRoom = room;
  makePeer();
  if (isInitiator) {
    const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { room, offer });
  }
});

socket.on('offer', async (offer) => {
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('answer', { room: currentRoom, answer });
});

socket.on('answer', async (answer) => {
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on('ice-candidate', async (candidate) => {
  try {
    await pc.addIceCandidate(new RTCIceCandidate(candidate));
  } catch(e) {
    console.log('ICE Fehler:', e);
  }
});

socket.on('partner-left', () => {
  setStatus('Partner hat getrennt...');
  document.getElementById('remoteVideo').srcObject = null;
  findPartner();
});

function nextPartner() {
  socket.emit('next', { room: currentRoom });
  document.getElementById('remoteVideo').srcObject = null;
  findPartner();
}

function hangUp() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  localStream = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localVideo').srcObject = null;
  setStatus('Willkommen bei SIWV – klicke auf Starten!');
  setBtns(true, false, false);
}

function setStatus(t) { document.getElementById('status').textContent = t; }
function setBtns(start, next, end) {
  document.getElementById('btnStart').disabled = !start;
  document.getElementById('btnNext').disabled  = !next;
  document.getElementById('btnEnd').disabled   = !end;
}
  </script>
</body>
</html>
