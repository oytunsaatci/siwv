<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SIWV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: white;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    #remoteVideo, #localVideo {
      position: absolute;
      object-fit: cover;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #remoteVideo {
      inset: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 0;
    }

    #localVideo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      z-index: 10;
      background: #1a1a1a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      cursor: pointer;
      transform: scaleX(-1);
    }

    #localVideo.swapped {
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
      z-index: 0;
      transform: scaleX(-1);
      cursor: pointer;
    }

    #remoteVideo.swapped {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      cursor: pointer;
    }

    /* Positionen für lokales Video (klein) */
    #localVideo.pos-br { bottom: 90px; right: 20px; }
    #localVideo.pos-bl { bottom: 90px; left: 20px; }
    #localVideo.pos-tr { top: 80px; right: 20px; }
    #localVideo.pos-tl { top: 80px; left: 20px; }

    /* Positionen für remote Video (klein, wenn geswapt) */
    #remoteVideo.pos-br { bottom: 90px; right: 20px; }
    #remoteVideo.pos-bl { bottom: 90px; left: 20px; }
    #remoteVideo.pos-tr { top: 80px; right: 20px; }
    #remoteVideo.pos-tl { top: 80px; left: 20px; }

    /* Position-Picker */
    .pos-picker {
      position: absolute;
      z-index: 30;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
    }

    .pos-picker.show { display: grid; }

    .pos-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .pos-btn:hover { background: rgba(255,255,255,0.25); }
    .pos-btn.active { background: white; color: #080808; }

    .overlay-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-size: 20px; font-weight: 600; letter-spacing: 3px; }

    #status-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 14px; border-radius: 50px;
      font-size: 13px; color: rgba(255,255,255,0.8);
    }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #666; transition: background 0.3s; }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.searching { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .start-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 15; background: #080808;
      transition: opacity 0.5s;
    }
    .start-screen.hidden { opacity: 0; pointer-events: none; }

    .start-logo {
      font-size: 52px; font-weight: 600; letter-spacing: 8px; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #aaa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .start-sub { font-size: 15px; color: rgba(255,255,255,0.4); margin-bottom: 48px; font-weight: 300; }

    .btn-start-big {
      background: white; color: #080808; border: none;
      padding: 16px 48px; border-radius: 50px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    .btn-start-big:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(255,255,255,0.2); }

    .waiting-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 12; background: rgba(8,8,8,0.85);
      backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .waiting-overlay.show { opacity: 1; pointer-events: all; }

    .spinner {
      width: 48px; height: 48px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .waiting-text { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 300; }

    .controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      z-index: 20;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn {
      border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-weight: 500;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    .btn-icon {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; width: 46px; height: 46px;
      border-radius: 50%; font-size: 18px;
      justify-content: center;
    }
    .btn-icon:hover:not(:disabled) { background: rgba(255,255,255,0.22); transform: scale(1.05); }
    .btn-icon.off { background: rgba(239,68,68,0.7); border-color: rgba(239,68,68,0.5); }

    .btn-next {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 12px 24px;
      border-radius: 50px; font-size: 14px;
    }
    .btn-next:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: scale(1.03); }

    .btn-end {
      background: rgba(239,68,68,0.85);
      backdrop-filter: blur(10px);
      color: white; padding: 12px 24px;
      border-radius: 50px; font-size: 14px;
    }
    .btn-end:hover:not(:disabled) { background: rgba(239,68,68,1); transform: scale(1.03); }
  </style>
</head>
<body>

  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay muted playsinline class="pos-br"></video>

  <!-- Position Picker -->
  <div class="pos-picker" id="posPicker">
    <button class="pos-btn" data-pos="tl" onclick="setPos('tl')">↖</button>
    <button class="pos-btn" data-pos="tr" onclick="setPos('tr')">↗</button>
    <button class="pos-btn active" data-pos="bl" onclick="setPos('bl')">↙</button>
    <button class="pos-btn" data-pos="br" onclick="setPos('br')">↘</button>
  </div>

  <div class="overlay-top">
    <div class="logo">SIWV</div>
    <div id="status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Bereit</span>
    </div>
  </div>

  <div class="start-screen" id="start-screen">
    <div class="start-logo">SIWV</div>
    <div class="start-sub">Triff neue Menschen weltweit</div>
    <button class="btn-start-big" onclick="findPartner()">Jetzt starten</button>
  </div>

  <div class="waiting-overlay" id="waiting-overlay">
    <div class="spinner"></div>
    <div class="waiting-text">Suche einen Partner...</div>
  </div>

  <div class="controls">
    <button class="btn btn-icon" id="btnMic"  onclick="toggleMic()" disabled>🎤</button>
    <button class="btn btn-icon" id="btnCam"  onclick="toggleCam()" disabled>📷</button>
    <button class="btn btn-icon" id="btnFlip" onclick="flipCamera()" disabled title="Kamera wechseln">🔄</button>
    <button class="btn btn-next" id="btnNext" onclick="nextPartner()" disabled>Weiter →</button>
    <button class="btn btn-end"  id="btnEnd"  onclick="hangUp()"     disabled>✕</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let localStream, pc, currentRoom;
    let micOn = true, camOn = true;
    let currentPos = 'br';
    let swapped = false;
    let facingMode = 'user';
    let pickerVisible = false;

    const cfg = {
      iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:global.relay.metered.ca:80", username: "e005037a7167582faa2fa409", credential: "jehlFvnUS7KbnGrz" },
        { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "e005037a7167582faa2fa409", credential: "jehlFvnUS7KbnGrz" },
        { urls: "turn:global.relay.metered.ca:443", username: "e005037a7167582faa2fa409", credential: "jehlFvnUS7KbnGrz" },
        { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "e005037a7167582faa2fa409", credential: "jehlFvnUS7KbnGrz" }
      ]
    };

    // Position Picker
    const localVid = document.getElementById('localVideo');
    const remoteVid = document.getElementById('remoteVideo');
    const picker = document.getElementById('posPicker');

    localVid.addEventListener('click', (e) => {
      if (swapped) { doSwap(); return; }
      e.stopPropagation();
      pickerVisible = !pickerVisible;
      picker.classList.toggle('show', pickerVisible);
      positionPicker();
    });

    remoteVid.addEventListener('click', () => {
      if (swapped) { doSwap(); return; }
      picker.classList.remove('show');
      pickerVisible = false;
    });

    document.addEventListener('click', () => {
      picker.classList.remove('show');
      pickerVisible = false;
    });

    function positionPicker() {
      const pos = currentPos;
      if (pos === 'br') { picker.style.bottom = '160px'; picker.style.right = '20px'; picker.style.top = ''; picker.style.left = ''; }
      else if (pos === 'bl') { picker.style.bottom = '160px'; picker.style.left = '20px'; picker.style.top = ''; picker.style.right = ''; }
      else if (pos === 'tr') { picker.style.top = '150px'; picker.style.right = '20px'; picker.style.bottom = ''; picker.style.left = ''; }
      else if (pos === 'tl') { picker.style.top = '150px'; picker.style.left = '20px'; picker.style.bottom = ''; picker.style.right = ''; }
    }

    function setPos(pos) {
      currentPos = pos;
      const posMap = { tl: 'pos-tl', tr: 'pos-tr', bl: 'pos-bl', br: 'pos-br' };
      localVid.className = localVid.className.replace(/pos-\w+/, '') + ' ' + posMap[pos];
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === pos));
      picker.classList.remove('show');
      pickerVisible = false;
    }

    function doSwap() {
      swapped = !swapped;
      const posMap = { tl: 'pos-tl', tr: 'pos-tr', bl: 'pos-bl', br: 'pos-br' };
      if (swapped) {
        localVid.classList.add('swapped');
        remoteVid.classList.add('swapped');
        remoteVid.classList.add(posMap[currentPos]);
      } else {
        localVid.classList.remove('swapped');
        remoteVid.classList.remove('swapped');
        remoteVid.className = remoteVid.className.replace(/pos-\w+/, '');
      }
    }

    // Kamera flip
    async function flipCamera() {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      if (localStream) {
        localStream.getVideoTracks().forEach(t => t.stop());
      }
      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: facingMode },
          audio: false
        });
        const newVideoTrack = newStream.getVideoTracks()[0];
        localStream.getVideoTracks().forEach(t => localStream.removeTrack(t));
        localStream.addTrack(newVideoTrack);
        localVid.srcObject = null;
        localVid.srcObject = localStream;
        if (pc) {
          const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
          if (sender) sender.replaceTrack(newVideoTrack);
        }
        // Spiegel nur bei Frontkamera
        localVid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
      } catch(e) {
        console.log('Kamera wechsel fehler:', e);
      }
    }

    async function findPartner() {
      document.getElementById('start-screen').classList.add('hidden');
      if (!localStream) {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user' },
            audio: true
          });
          localVid.srcObject = localStream;
        } catch(e) {
          alert('Bitte Kamera & Mikrofon erlauben!');
          document.getElementById('start-screen').classList.remove('hidden');
          return;
        }
      }
      socket.emit('find-partner');
      setStatus('searching', 'Suche...');
      showWaiting(true);
      setBtns(false, false);
      document.getElementById('btnMic').disabled = false;
      document.getElementById('btnCam').disabled = false;
      document.getElementById('btnFlip').disabled = false;
    }

    function makePeer() {
      if (pc) { pc.close(); pc = null; }
      pc = new RTCPeerConnection(cfg);
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      pc.ontrack = (event) => {
        if (remoteVid.srcObject !== event.streams[0]) remoteVid.srcObject = event.streams[0];
        showWaiting(false);
        setStatus('connected', 'Verbunden');
        setBtns(true, true);
      };
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) socket.emit('ice-candidate', { room: currentRoom, candidate });
      };
      pc.oniceconnectionstatechange = ()
